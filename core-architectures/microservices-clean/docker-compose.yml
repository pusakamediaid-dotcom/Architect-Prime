version: '3.8'

services:
  # API Gateway
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_URL=http://user-service:3001
      - ORDER_SERVICE_URL=http://order-service:3002
      - PAYMENT_SERVICE_URL=http://payment-service:3003
    depends_on:
      - user-service
      - order-service
    networks:
      - microservices-network

  # User Service
  user-service:
    build: ./services/user-service
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=users_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - JWT_SECRET=\${JWT_SECRET}
    depends_on:
      - postgres
    networks:
      - microservices-network

  # Order Service
  order-service:
    build: ./services/order-service
    ports:
      - "3002:3002"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=orders_db
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - microservices-network

  # Payment Service
  payment-service:
    build: ./services/payment-service
    ports:
      - "3003:3003"
    environment:
      - DB_HOST=postgres
    depends_on:
      - postgres
    networks:
      - microservices-network

  # Notification Service
  notification-service:
    build: ./services/notification-service
    ports:
      - "3004:3004"
    depends_on:
      - rabbitmq
    networks:
      - microservices-network

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_MULTIPLE_DATABASES=users_db,orders_db,payments_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - microservices-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge

volumes:
  postgres-data:
