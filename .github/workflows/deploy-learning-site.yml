name: Validate Learning Site

on:
  push:
    branches: [main]
    paths:
      - "learning-site/**"
      - "scripts/validate-static-site.mjs"
      - ".github/workflows/deploy-learning-site.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate static Vercel site
        run: node scripts/validate-static-site.mjs
