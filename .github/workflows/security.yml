name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >
            p/owasp-top-ten
            p/nodejs
            p/python
            p/docker

      - name: Run Bandit
        if: always()
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-results.json || true

      - name: Run ESLint Security
        if: always()
        run: |
          npm install --save-dev @eslint-community/eslint-plugin-security
          npx eslint --plugin @eslint-community/security . || true

      - name: Upload results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: sast-results
          path: |
            **/bandit-results.json
            semgrep.json

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: |
          npm audit --json > npm-audit-results.json || true

      - name: Run Python safety check
        run: |
          pip install safety
          safety check --json > safety-results.json || true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: dependency-scan-results
          path: |
            npm-audit-results.json
            safety-results.json
            trivy-results.sarif

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t architect-prime:${{ github.sha }} .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'architect-prime:${{ github.sha }}'
          format: 'sarif'
          output: 'container-scan-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload container scan results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: container-scan-results
          path: container-scan-results.sarif

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: goreleaser/gitleaks-action@master
        with:
          config_path: .gitleaks.toml

      - name: Run TruffleHog
        run: |
          docker run -v $(pwd):/workspace trufflehog:latest filesystem /workspace

  dast:
    name: Dynamic Application Security Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application
        run: |
          docker-compose up -d
          sleep 10

      - name: Run OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.9.0
        with:
          target: 'http://localhost:8080'

      - name: Upload ZAP results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: zap-results
          path: |
            zap.out
            zap.json

  code-review:
    name: Code Security Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          languages: |
            javascript
            typescript
            python
            go
          queries: security-extended

      - name: Check sensitive data exposure
        run: |
          echo "Checking for sensitive data patterns..."
          
          grep -r "password\s*=" --include="*.js" --include="*.py" . || true
          grep -r "api_key\s*=" --include="*.js" --include="*.py" . || true
          grep -r "secret\s*=" --include="*.js" --include="*.py" . || true

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run dependency review action
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: critical

  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run FOSSA
        uses: fossa/fossa-action@main
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}

      - name: Generate SBOM
        run: |
          pip install syft
          syft . -o json > sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom.json

  security-report:
    name: Security Report Generation
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan, secrets-scan, code-review]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Generate summary
        run: |
          echo "# Security Scan Summary" > security-report.md
          echo "Generated at: $(date)" >> security-report.md
          echo "" >> security-report.md
          
          if [ -d "sast-results" ]; then
            echo "## SAST Results" >> security-report.md
            echo "Found SAST artifacts" >> security-report.md
          fi
          
          if [ -d "dependency-scan-results" ]; then
            echo "## Dependency Scan Results" >> security-report.md
            echo "Found dependency scan artifacts" >> security-report.md
          fi

      - name: Upload security report
        uses: actions/upload-artifact@v3
        with:
          name: security-report
          path: security-report.md