name: Release Automation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select release notes
        id: notes
        run: |
          TAG_NAME="${GITHUB_REF_NAME:-manual}"
          if [ -f "releases/${TAG_NAME}.md" ]; then
            echo "path=releases/${TAG_NAME}.md" >> "$GITHUB_OUTPUT"
          elif [ -f "releases/v0.2.0-beta.md" ]; then
            echo "path=releases/v0.2.0-beta.md" >> "$GITHUB_OUTPUT"
          else
            echo "path=CHANGELOG.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
