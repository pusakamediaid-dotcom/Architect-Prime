name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install linting tools
        run: pip install flake8 black pylint
      
      - name: Run Black
        run: black --check .
      
      - name: Run Flake8
        run: flake8 .
      
      - name: Run Pylint
        run: pylint **/*.py || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt || pip install pytest pytest-cov
      
      - name: Run tests
        run: pytest --cov=. --cov-report=xml

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker images
        run: |
          docker build -t architect-prime:latest .
      
      - name: Run security scan
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock           aquasec/trivy image architect-prime:latest || true

  deploy:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to preview
        run: echo "Deploying to preview environment..."
        # Add your deployment steps here
