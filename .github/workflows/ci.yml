name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  python-compile:
    name: Python Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile Python modules
        run: python -m compileall -q academic-utilities multi-language-modules/python-data-science devops-and-automation

  node-build-test:
    name: Node.js Build and Smoke Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: multi-language-modules/nodejs-typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: multi-language-modules/nodejs-typescript/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm audit --audit-level=high

  docker-compose-config:
    name: Docker Compose Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate demo compose file
        run: docker compose -f devops-and-automation/docker-compose/docker-compose.demo.yml config
