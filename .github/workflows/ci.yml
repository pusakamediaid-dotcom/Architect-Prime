name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  python-compile:
    name: Python Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile Python modules
        run: python -m compileall -q academic-utilities multi-language-modules/python-data-science devops-and-automation

  node-production-baseline:
    name: Node.js Prisma Build, Test, Coverage, Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: multi-language-modules/nodejs-typescript
    env:
      NODE_ENV: test
      DATABASE_URL: file:./ci.db
      JWT_SECRET: ci-only-secret-change-in-production
      ALLOWED_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: multi-language-modules/nodejs-typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Apply Prisma migrations
        run: npm run prisma:migrate
      - name: Build TypeScript
        run: npm run build
      - name: Lint TypeScript
        run: npm run lint
      - name: Run unit, integration, smoke tests with coverage
        run: npm test
      - name: Security audit
        run: npm audit --audit-level=high
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nodejs-typescript-coverage
          path: multi-language-modules/nodejs-typescript/coverage

  docker-compose-config:
    name: Docker Compose Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate demo compose file
        run: docker compose -f devops-and-automation/docker-compose/docker-compose.demo.yml config
