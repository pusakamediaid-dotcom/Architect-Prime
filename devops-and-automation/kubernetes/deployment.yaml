apiVersion: apps/v1
kind: Deployment
metadata:
  name: architect-prime-node-api
  labels:
    app: architect-prime-node-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: architect-prime-node-api
  template:
    metadata:
      labels:
        app: architect-prime-node-api
    spec:
      containers:
        - name: node-api
          image: architect-prime-node-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: architect-prime-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: architect-prime-node-api
spec:
  type: ClusterIP
  selector:
    app: architect-prime-node-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: v1
kind: Secret
metadata:
  name: architect-prime-secrets
type: Opaque
stringData:
  jwt-secret: change-me-before-production
