services:
  node-api:
    build:
      context: ../../multi-language-modules/nodejs-typescript
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-local-development}
      ALLOWED_ORIGINS: http://localhost:3000
      DATABASE_URL: file:./dev.db
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-architect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-architect_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-architect_prime}
    ports:
      - "5432:5432"
    volumes:
      - architect-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-architect}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  architect-postgres-data:
